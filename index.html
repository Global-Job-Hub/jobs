<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Job Hub | Find Your Next Career</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 80px 20px; background-color: #f4f7f9; margin: 0; color: #333; }
        .container { background: white; padding: 50px 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: inline-block; width: 100%; max-width: 550px; border: 1px solid #e1e4e8; }
        h1 { color: #2c3e50; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 2.2rem; }
        p { color: #7f8c8d; font-size: 1.1rem; margin-bottom: 30px; }
        
        /* Search Container */
        .search-container { position: relative; width: 100%; margin-top: 20px; }
        #jobSearch { width: 100%; padding: 15px 20px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; transition: border-color 0.3s, box-shadow 0.3s; }
        #jobSearch:focus { border-color: #007bff; box-shadow: 0 0 8px rgba(0,123,255,0.15); }

        /* Suggestions Dropdown */
        #results { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-radius: 0 0 10px 10px; border: 1px solid #ddd; border-top: none; display: none; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-height: 350px; overflow-y: auto; text-align: left; }
        .result-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f8f8f8; transition: background 0.2s; }
        .result-item:hover { background: #f0f7ff; }
        .result-title { font-weight: 600; color: #007bff; font-size: 15px; }
        .result-meta { font-size: 12px; color: #666; margin-top: 2px; }

        /* Trending section */
        .trending { margin-top: 20px; font-size: 13px; color: #999; }
        .trending span { color: #007bff; cursor: pointer; margin: 0 5px; text-decoration: underline; }

        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌐 Global Job Hub</h1>
        <p>Connecting you to millions of opportunities worldwide.</p>

        <div class="search-container">
            <input type="text" id="jobSearch" placeholder="Search by title, company, or location..." autocomplete="off">
            <div id="results"></div>
        </div>

        <div class="trending">
            Trending: <span onclick="quickSearch('Remote')">Remote</span>, 
            <span onclick="quickSearch('Developer')">Developer</span>, 
            <span onclick="quickSearch('Manager')">Manager</span>
        </div>

        <p style="margin-top:40px;"><small>© 2026 Global Job Hub | <a href="privacy.html">Privacy Policy</a> | Powered by Jooble API</small></p>
    </div>

    <script>
        const input = document.getElementById('jobSearch');
        const results = document.getElementById('results');
        let fuse;

        // 1. Fetch the index generated by your Python script
        fetch('jobs_index.json')
            .then(res => res.json())
            .then(data => {
                const options = {
                    keys: ['t', 'c', 'l'], // Search in Title, Company, and Location
                    threshold: 0.4,        // Lower = stricter. 0.4 is perfect for typos.
                    distance: 100
                };
                fuse = new Fuse(data, options);
            })
            .catch(err => console.error("Could not load jobs index:", err));

        // 2. Handle User Input
        input.addEventListener('input', () => {
            const val = input.value.trim();
            results.innerHTML = '';
            
            if (!fuse || val.length < 2) {
                results.style.display = 'none';
                return;
            }

            const searchResult = fuse.search(val).slice(0, 10);

            if (searchResult.length > 0) {
                results.style.display = 'block';
                searchResult.forEach(match => {
                    const job = match.item;
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="result-title">${job.t}</div>
                        <div class="result-meta">${job.c} • ${job.l}</div>
                    `;
                    // mousedown used to trigger before the blur event
                    div.onmousedown = () => window.location.href = job.u;
                    results.appendChild(div);
                });
            } else {
                results.innerHTML = '<div style="padding:20px; color:#999; font-size:14px;">No jobs found. Try a different keyword!</div>';
                results.style.display = 'block';
            }
        });

        // 3. Hide results when clicking outside
        input.addEventListener('blur', () => {
            setTimeout(() => results.style.display = 'none', 200);
        });

        // Quick search for trending tags
        function quickSearch(term) {
            input.value = term;
            input.dispatchEvent(new Event('input'));
            input.focus();
        }
    </script>
</body>
</html>
