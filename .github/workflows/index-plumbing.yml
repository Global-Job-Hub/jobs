name: Index Plumbing Page

on:
  workflow_dispatch: 
  push:
    paths:
      - 'plumbing/**'

jobs:
  index-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests oauth2client

      - name: Run Indexing Script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        # Correct path based on your screenshot
        run: python plumbing/index_plumbing.py
