name: Index Plumbing Page

on:
  workflow_dispatch: # Allows you to run it manually from the Actions tab
  push:
    paths:
      - 'jobs/plumbing/**' # Runs automatically if you edit files in this folder

jobs:
  index-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests oauth2client

      - name: Run Indexing Script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        # This tells GitHub to go inside the folder before running the command
        working-directory: jobs/plumbing
        run: python index_plumbing.py
