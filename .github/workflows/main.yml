name: Build and Index Job Pages

on:
  push:
    paths:
      - 'jobs.json'       # Trigger only when jobs.json is updated
  workflow_dispatch:      # Allows manual trigger

jobs:
  build_and_index:
    runs-on: ubuntu-latest

    env:
      SITE_URL: https://global-job-hub.github.io/jobs/
      AD_160X300: ${{ secrets.AD_160X300 }}
      AD_160X600: ${{ secrets.AD_160X600 }}
      AD_300X250: ${{ secrets.AD_300X250 }}
      AD_320X50:  ${{ secrets.AD_320X50 }}
      AD_468X60:  ${{ secrets.AD_468X60 }}
      AD_728X90:  ${{ secrets.AD_728X90 }}
      AD_NATIVE:  ${{ secrets.AD_NATIVE }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true  # Allows pushing back without a token

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Generate Job Pages & Send to Google
        run: |
          python content_manager.py jobs.json

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html index.json generated_urls.json sent_urls.json pending_urls.txt || echo "No files to add"
          git commit -m "Update job pages and index files [skip ci]" || echo "No changes to commit"
          git push origin main
