name: Global Job Hub Jobber

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Ensures the action has permission to push files
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Upgraded from 3.10 to stay supported until 2026+

      - name: Install Dependencies
        run: |
          pip install requests google-api-python-client google-auth

      - name: Generate Job Pages
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          SITE_URL: "https://global-job-hub.github.io/jobs/"
        run: python content_manager.py --generate

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Automated Job Update $(date)" || echo "No changes to commit"
          git push

      - name: Notify Google Indexing
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SITE_URL: "https://global-job-hub.github.io/jobs/"
        run: python content_manager.py --index
