name: Manual Job Hub Update

on:
  workflow_dispatch:
  push:
    paths:
      - 'manual_jobs.json'

jobs:
  build-and-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Allows the bot to save the cache file

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install google-api-python-client google-auth requests

      - name: Generate HTML Pages
        run: python content_manager.py manual_jobs.json

      - name: Send New Jobs to Google
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python indexer.py

      - name: Save Changes and Cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # This saves the new HTML files AND the updated indexed_jobs.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Update jobs and indexing cache" && git push)
