name: Global Job Hub Jobber

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated from v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated from v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests google-api-python-client google-auth

      - name: Generate Job Pages
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: python content_manager.py --generate

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Automated Job Update $(date)" || echo "No changes to commit"
          git push

      - name: Notify Google Indexing
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python content_manager.py --index
