name: Global Job Hub Jobber

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib certifi

      - name: Generate Jobs & Notify Google
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SITE_URL: "https://global-job-hub.github.io/jobs/"
          # Ensuring Python uses the certifi bundle for SSL
          SSL_CERT_FILE: ${{ env.pythonLocation }}/lib/python3.12/site-packages/certifi/cacert.pem
        run: python content_manager.py --generate

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          date > last_run.txt
          git add .
          git commit -m "🚀 Automated Job & Index Update $(date)" || echo "No changes to commit"
          git push
