name: Build and Index Job Pages

on:
  push:
    paths:
      - 'jobs.json'
  workflow_dispatch:

jobs:
  build_and_index:
    runs-on: ubuntu-latest

    env:
      SITE_URL: https://global-job-hub.github.io/jobs/
      AD_160X300: ${{ secrets.AD_160X300 }}
      AD_160X600: ${{ secrets.AD_160X600 }}
      AD_300X250: ${{ secrets.AD_300X250 }}
      AD_320X50:  ${{ secrets.AD_320X50 }}
      AD_468X60:  ${{ secrets.AD_468X60 }}
      AD_728X90:  ${{ secrets.AD_728X90 }}
      AD_NATIVE:  ${{ secrets.AD_NATIVE }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Generate Job Pages & Send to Google
        run: python content_manager.py jobs.json

      - name: Commit generated files safely
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for file in index.json generated_urls.json sent_urls.json pending_urls.txt *.html; do
            [ -f "$file" ] && git add "$file"
          done
          git commit -m "Update generated job pages and index" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          branch: main
          force: true

      - name: Wait for GitHub Pages propagation
        run: |
          echo "Waiting 60 seconds for pages to go live..."
          sleep 60

      - name: Confirm new URLs sent
        run: echo "Check sent_urls.json for URLs sent to Google Indexing API"
