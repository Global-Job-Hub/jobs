name: Manual Job Update

on:
  # This allows you to run the script manually from the Actions tab
  workflow_dispatch: 

  # If you want it to also run every time you push a change to your code
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth

      - name: Run Content Manager
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python content_manager.py
