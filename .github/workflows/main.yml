name: Jobber
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth

      - name: Generate Job Pages
        env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          ADSTERRA_BANNER_CODE: ${{ secrets.ADSTERRA_BANNER_CODE }}
        run: python content_manager.py --generate

      - name: Push Pages to GitHub
        run: |
          git config --global user.name "JobBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "New Jobs Generated" || exit 0
          git push

      - name: Wait for GitHub Pages to Deploy
        run: sleep 90

      - name: Notify Google Indexing API
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python content_manager.py --index
